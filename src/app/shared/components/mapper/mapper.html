<div class="mapper__node" *ngFor="let node of mapper; index as i; trackBy: trackByIndex">
    <div class="mapper__row">
        @if (isRoot && isFirstNode(node)) {
        <app-field [label]="label" [required]="required">
            <app-text-field [(ngModel)]="node.label" placeholder="Clé" [disabled]="readonly" (focusout)="removeNodeIfEmpty(node); emitJson()" />
        </app-field>
        } @else {
        <app-text-field [(ngModel)]="node.label" placeholder="Clé" [disabled]="readonly" (focusout)="removeNodeIfEmpty(node); emitJson()" />
        }

        @if (node.children.length && node.label) {
        <app-select-field class="mapper__type" [options]="objectTypeOptions" [(ngModel)]="node.containerType"
            optionLabel="label" optionValue="value" [disabled]="readonly" (ngModelChange)="emitJson()" />
        }

        @if (!node.children.length && node.label) {
        <app-select-field class="mapper__type" [options]="typeOptions" [(ngModel)]="node.type"
            optionLabel="label" optionValue="value" placeholder="Type" [disabled]="readonly" (ngModelChange)="emitJson()" />
        @if (node.type === 'list') {
        <app-select-field class="mapper__type" [options]="itemTypeOptions" [(ngModel)]="node.itemType"
            optionLabel="label" optionValue="value" placeholder="Type des éléments" [disabled]="readonly" (ngModelChange)="emitJson()" />
        }
        <app-text-field class="mapper__desc" [(ngModel)]="node.description" placeholder="Description" [disabled]="readonly" (focusout)="emitJson()" />
        <app-requirements-editor class="mapper__req" [requirements]="node.requirements" [readonly]="readonly" (requirementsChange)="emitJson()" />
        @if (!readonly) {
        <p-button icon="fa-regular fa-plus" variant="text" severity="secondary"
            size="small" (click)="addChild(node)" [pTooltip]="'Ajouter un enfant à ' + node.label" rounded />
        }
        }
    </div>

    <app-mapper class="mapper__children" [mapper]="node.children" [readonly]="readonly" (jsonChange)="onChildJsonChange()" [usingKeys]="usingKeys" />

    @if (!readonly && isLastNode(node) && node.label) {
    <p-button icon="fa-regular fa-plus" variant="text" severity="secondary" size="small"
        (click)="addNode(node.parent)" [pTooltip]="'Ajouter un champ à ' + (node.parent?.label ?? root)" rounded/>
    }
</div>
